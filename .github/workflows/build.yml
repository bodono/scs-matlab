name: Build

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test MEX (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2022b

      - name: Compile MEX
        uses: matlab-actions/run-command@v3
        with:
          command: make_scs

      - name: Test
        uses: matlab-actions/run-tests@v3
        with:
          source-folder: ./
          select-by-folder: test

      - name: Upload MEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mex-${{ matrix.os }}
          path: |
            matlab/*.mex*
            !*.prj
            !*.mltbx

  package:
    name: Package .mltbx
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Download MEX binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: matlab/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2023a

      - name: Package Toolbox
        uses: matlab-actions/run-command@v3
        with:
          command: package_scs

      - name: Upload Toolbox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SCS-toolbox
          path: SCS.mltbx

  test-toolbox:
    name: Test Toolbox (${{ matrix.os }})
    needs: package
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download Toolbox
        uses: actions/download-artifact@v4
        with:
          name: SCS-toolbox
          path: ./

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2023a

      - name: Smoke Test
        uses: matlab-actions/run-command@v3
        with:
          command: "matlab.addons.toolbox.installToolbox('SCS.mltbx'); disp(scs_version); data.A = sparse(-1); data.b = -1; data.c = 1; cones.l = 1; [x, y, s, info] = scs(data, cones, struct('verbose', 0)); disp(info.status); assert(strcmp(info.status, 'solved'))"

  release:
    name: Create Release
    needs: test-toolbox
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Toolbox
        uses: actions/download-artifact@v4
        with:
          name: SCS-toolbox
          path: ./

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: SCS.mltbx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
