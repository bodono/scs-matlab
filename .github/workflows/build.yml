name: Build

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test MEX (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2022b

      - name: Compile MEX
        uses: matlab-actions/run-command@v3
        with:
          command: make_scs

      - name: Test
        uses: matlab-actions/run-tests@v3
        with:
          source-folder: ./
          select-by-folder: test

      - name: Upload MEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mex-${{ matrix.os }}
          path: |
            matlab/*.mex*
            !*.prj
            !*.mltbx

  package:
    name: Package .mltbx
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Download MEX binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: matlab/

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2023a

      - name: Package Toolbox
        uses: matlab-actions/run-command@v3
        with:
          command: package_scs

      - name: Upload Toolbox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SCS-toolbox
          path: SCS.mltbx

  test-toolbox:
    name: Test Toolbox (${{ matrix.os }})
    needs: package
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download Toolbox
        uses: actions/download-artifact@v4
        with:
          name: SCS-toolbox
          path: ./

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2023a

      - name: Smoke Test
        uses: matlab-actions/run-command@v3
        with:
          command: |
            toolboxes = matlab.addons.toolbox.installedToolboxes;
            if ~isempty(toolboxes)
                matches = strcmp({toolboxes.Guid}, '9fe2fe4d-165e-4d2d-8511-91bcef1583b0');
                for i = find(matches)
                    matlab.addons.toolbox.uninstallToolbox(toolboxes(i));
                end
            end
            installedToolbox = matlab.addons.toolbox.installToolbox('SCS.mltbx');
            assert(strcmp(installedToolbox.Guid, '9fe2fe4d-165e-4d2d-8511-91bcef1583b0'));
            scsPath = which('scs');
            scsVersionPath = which('scs_version');
            assert(~isempty(scsPath), 'Installed toolbox did not put scs on the MATLAB path');
            assert(~isempty(scsVersionPath), 'Installed toolbox did not put scs_version on the MATLAB path');
            assert(contains(scsPath, [filesep 'matlab' filesep]), ...
                sprintf('Expected scs.m to come from installed toolbox matlab/ folder, got: %s', scsPath));
            assert(exist('scs_version', 'file') == 3, ...
                sprintf('Expected scs_version to resolve to a MEX file, got: %s', scsVersionPath));
            disp(scs_version);
            data.A = sparse(-1);
            data.b = -1;
            data.c = 1;
            cones.l = 1;
            [x, y, s, info] = scs(data, cones, struct('verbose', 0));
            assert(strcmp(info.status, 'solved'), info.status);
            assert(isfinite(x) && isfinite(y) && isfinite(s));
            [x, y, s, info] = scs(data, cones, struct('verbose', 0, 'use_qdldl', true));
            assert(strcmp(info.status, 'solved'), info.status);
            assert(isfinite(x) && isfinite(y) && isfinite(s));
            [x, y, s, info] = scs(data, cones, struct('verbose', 0, 'use_indirect', true));
            assert(strcmp(info.status, 'solved'), info.status);
            assert(isfinite(x) && isfinite(y) && isfinite(s));

  release:
    name: Create Release
    needs: test-toolbox
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Toolbox
        uses: actions/download-artifact@v4
        with:
          name: SCS-toolbox
          path: ./

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          files: SCS.mltbx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
